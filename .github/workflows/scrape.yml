# ============================================================
# Verse Hotels Review Scraper — Auto Scraping
# Repo: COO-Versehotels/coo-dashboard
# 
# Schedule: setiap 2 jam (12x sehari)
# Trigger: cron + manual
# Output: auto-commit data.json + history.json
# Effect: GitHub Pages otomatis rebuild dashboard
# ============================================================

name: Auto Scrape Reviews

on:
  schedule:
    # Setiap 2 jam pada menit ke-15
    # GitHub cron pakai UTC, jadi Indonesia (WIB = UTC+7)
    # Cron berikut = Pukul 06:15, 08:15, 10:15, ... 04:15 WIB
    - cron: '15 */2 * * *'
  
  # Manual trigger dari tab Actions
  workflow_dispatch:

permissions:
  contents: write   # untuk commit data.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      
      - name: 🔍 Run scraper
        id: scrape
        run: |
          python agoda_collector.py
          echo "scrape_time=$(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M WIB')" >> $GITHUB_OUTPUT
      
      - name: 🔎 Check if data changed
        id: check_changes
        run: |
          if git diff --quiet data.json history.json error_log.txt 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ No data changes"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Data changed, will commit"
          fi
      
      - name: 💾 Commit & push updated data
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "verse-bot"
          git config user.email "verse-bot@users.noreply.github.com"
          git add data.json history.json error_log.txt
          git commit -m "🔄 Auto-scrape: ${{ steps.scrape.outputs.scrape_time }}"
          git push
      
      - name: 📊 Upload error log (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-${{ github.run_number }}
          path: error_log.txt
          retention-days: 7
          if-no-files-found: ignore
