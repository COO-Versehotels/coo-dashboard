<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERSE HOTELS — REVIEW PERFORMANCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --bg:#e8ebf0;
      --bg-soft:#dde1e8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#d1d5db;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --success:#059669;
      --success-soft:#d1fae5;
      --danger:#dc2626;
      --danger-soft:#fee2e2;
      --flat:#64748b;
      --flat-soft:#f1f5f9;
      --shadow:0 4px 20px rgba(15,23,42,0.08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
      background:linear-gradient(180deg, #e8ebf0 0%, #dde1e8 100%);
      color:var(--text);
      min-height:100vh;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
      padding:20px 14px 40px;
    }

    /* ========== HEADER ========== */
    .header{
      background:
        linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #dbeafe 100%);
      color:var(--text);
      border-radius:16px;
      padding:22px 24px;
      margin-bottom:18px;
      box-shadow:0 6px 24px rgba(30, 58, 138, 0.08);
      border:1px solid rgba(37, 99, 235, 0.15);
      position:relative;
      overflow:hidden;
    }

    .header::before{
      content:"";
      position:absolute;
      top:0; left:0; right:0;
      height:4px;
      background:linear-gradient(90deg, #1e3a8a, #2563eb, #3b82f6, #60a5fa);
    }

    .header::after{
      content:"";
      position:absolute;
      top:-30%; right:-10%;
      width:320px; height:320px;
      background:radial-gradient(circle, rgba(37, 99, 235, 0.08), transparent 65%);
      pointer-events:none;
    }

    .header-top{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:4px;
      position:relative;
      z-index:1;
    }

    .corporate-logo{
      width:64px;
      height:64px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#ffffff;
      border-radius:12px;
      padding:8px;
      box-shadow:0 2px 10px rgba(30, 58, 138, 0.08);
    }

    .corporate-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .header-title-wrap{
      flex:1;
      min-width:0;
    }

    .header h1{
      margin:0 0 6px;
      font-family:'Playfair Display', 'Georgia', serif;
      font-size:28px;
      letter-spacing:-0.5px;
      color:#0f172a;
      font-weight:700;
      line-height:1.15;
    }

    .header-sub{
      font-size:13px;
      color:#475569;
      line-height:1.5;
    }

    .header-dates{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }

    .date-pill{
      background:rgba(255, 255, 255, 0.7);
      border:1px solid rgba(37, 99, 235, 0.18);
      color:#334155;
      border-radius:8px;
      padding:7px 14px;
      font-size:12px;
      font-weight:600;
      backdrop-filter:blur(6px);
    }

    .date-pill b{ font-weight:700; color:var(--primary-dark); }

    /* ========== MATRIX COMPARISON TABLE ========== */
    .matrix-card{
      background:var(--card);
      border-radius:14px;
      padding:18px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    .matrix-title{
      font-family:'Playfair Display','Georgia',serif;
      font-size:20px;
      font-weight:700;
      margin:0 0 4px;
      color:var(--text);
      letter-spacing:-0.3px;
    }

    .matrix-sub{
      font-size:12px;
      color:var(--muted);
      margin-bottom:14px;
    }

    .matrix-wrap{
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:10px;
    }

    .matrix-table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      min-width:860px;
      table-layout:fixed;
    }

    .matrix-table th{
      text-align:center;
      padding:10px 8px;
      background:linear-gradient(180deg,#f8fafc,#f1f5f9);
      color:var(--text);
      font-weight:700;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.4px;
      border-bottom:2px solid var(--line);
      border-right:1px solid var(--line);
      white-space:nowrap;
    }

    .matrix-table th:last-child{ border-right:none; }
    .matrix-table th:first-child{ padding-left:14px; }

    .matrix-platform-head{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .matrix-platform-head .platform-logo{
      width:38px;
      height:28px;
      border-radius:5px;
    }

    .matrix-table td{
      padding:11px 10px;
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      vertical-align:middle;
      text-align:center;
    }

    .matrix-table td:last-child{ border-right:none; }
    .matrix-table tr:last-child td{ border-bottom:none; }
    .matrix-table tr:hover td{ background:#fafbfc; }

    /* Set fixed width for hotel column so platform columns get balanced space */
    .matrix-table th:first-child,
    .matrix-table .matrix-hotel-cell{
      width:170px;
      min-width:170px;
      max-width:170px;
    }

    .matrix-hotel-cell{
      text-align:left !important;
      padding:10px 12px !important;
      font-weight:600;
    }

    .matrix-hotel-cell .hotel-mini{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .matrix-hotel-cell .hotel-mini-logo{
      width:32px;
      height:32px;
      border-radius:6px;
      background:#fff;
      padding:2px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .matrix-hotel-cell .hotel-mini-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .matrix-hotel-cell .hotel-mini-name{
      font-size:13.5px;
      font-weight:700;
      line-height:1.25;
      white-space:nowrap;
    }

    .matrix-cell-rating{
      font-size:15px;
      font-weight:800;
      color:var(--primary-dark);
      line-height:1.1;
    }

    .matrix-cell-reviews{
      font-size:11.5px;
      color:var(--text);
      margin-top:6px;
      font-weight:600;
    }

    .matrix-cell-reviews-label{
      font-size:9.5px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.4px;
      font-weight:600;
      margin-top:2px;
    }

    .matrix-cell-delta{
      display:inline-block;
      margin-top:3px;
      padding:2px 7px;
      border-radius:999px;
      font-size:10px;
      font-weight:700;
      line-height:1.3;
    }

    .matrix-cell-delta .delta-icon{
      font-size:9px;
      margin-right:2px;
      opacity:0.85;
    }

    .matrix-cell-divider{
      height:1px;
      background:var(--line);
      margin:7px auto 5px;
      width:60%;
    }

    .matrix-na{
      color:var(--muted);
      font-style:italic;
      font-size:12px;
      font-weight:500;
    }

    /* ========== CHART SECTION ========== */
    .charts-section{
      margin-bottom:14px;
    }

    .charts-section-title{
      font-family:'Playfair Display','Georgia',serif;
      font-size:22px;
      font-weight:700;
      margin:8px 0 14px 4px;
      color:var(--text);
      letter-spacing:-0.3px;
    }

    .chart-card{
      background:var(--card);
      border-radius:14px;
      padding:18px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    .chart-hotel-header{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:14px;
      padding-bottom:12px;
      border-bottom:1px solid var(--line);
    }

    .chart-hotel-logo{
      width:48px;
      height:48px;
      border-radius:8px;
      background:#fff;
      padding:3px;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .chart-hotel-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .chart-hotel-name{
      font-size:16px;
      font-weight:700;
      margin:0;
      color:var(--text);
    }

    .chart-hotel-period{
      font-size:11.5px;
      color:var(--muted);
      margin-top:2px;
    }

    .chart-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .chart-box{
      background:var(--card-soft, #fafbfc);
      border:1px solid var(--line);
      border-radius:10px;
      padding:12px;
    }

    .chart-box-title{
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.5px;
      margin-bottom:8px;
      text-align:center;
    }

    .chart-canvas-wrap{
      position:relative;
      height:220px;
    }

    .chart-empty{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      font-style:italic;
      padding:60px 12px;
    }

    /* ========== HOTEL CARDS ========== */
    .hotel-card{
      background:var(--card);
      border-radius:14px;
      padding:18px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    .hotel-header{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:16px;
      padding-bottom:14px;
      border-bottom:1px solid var(--line);
    }

    .hotel-logo{
      width:68px;
      height:68px;
      border-radius:10px;
      background:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      overflow:hidden;
      padding:4px;
    }

    .hotel-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .hotel-name{
      font-size:18px;
      font-weight:700;
      margin:0;
      color:var(--text);
      letter-spacing:-0.2px;
    }

    .hotel-location{
      font-size:12px;
      color:var(--muted);
      margin-top:3px;
    }

    /* ========== TABLE ========== */
    .table-wrap{
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }

    th{
      text-align:left;
      padding:11px 14px;
      background:linear-gradient(180deg, #f8fafc, #f1f5f9);
      color:var(--text);
      font-weight:700;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.5px;
      border-bottom:2px solid var(--line);
      border-right:1px solid var(--line);
      white-space:nowrap;
    }

    th:last-child{ border-right:none; }

    th:nth-child(2),
    th:nth-child(3){ text-align:center; }

    td{
      padding:13px 14px;
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      vertical-align:middle;
    }

    td:last-child{ border-right:none; }

    tr:last-child td{ border-bottom:none; }

    tr:hover td{ background:#fafbfc; }

    .platform-cell{
      font-weight:600;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .platform-logo{
      width:40px;
      height:30px;
      border-radius:5px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      overflow:hidden;
    }

    .platform-logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .compare-cell{
      text-align:center;
      white-space:nowrap;
    }

    .compare-values{
      font-size:14px;
      font-weight:600;
      color:var(--text);
    }

    .compare-values .arrow{
      color:var(--muted);
      margin:0 6px;
      font-weight:400;
    }

    .compare-values .today{
      color:var(--primary-dark);
      font-weight:700;
    }

    .delta{
      display:inline-block;
      margin-top:4px;
      padding:3px 9px;
      border-radius:999px;
      font-size:11.5px;
      font-weight:700;
    }

    .delta-up{ background:var(--success-soft); color:var(--success); }
    .delta-down{ background:var(--danger-soft); color:var(--danger); }
    .delta-flat{ background:var(--flat-soft); color:var(--flat); }

    .na{
      color:var(--muted);
      font-style:italic;
      font-size:12px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width:640px){
      .container{ padding:14px 10px 30px; }
      .header{ padding:16px; border-radius:12px; }
      .header h1{ font-size:21px; }
      .corporate-logo{ width:44px; height:44px; }
      .hotel-card{ padding:14px; }
      .hotel-logo{ width:54px; height:54px; }
      .hotel-name{ font-size:15px; }
      th{ padding:8px; font-size:10px; }
      td{ padding:10px 8px; }
      .compare-values{ font-size:13px; }
      .delta{ font-size:11px; padding:2px 7px; }
      .platform-logo{ width:34px; height:26px; }
      .matrix-card{ padding:14px; }
      .matrix-title{ font-size:17px; }
      .matrix-table{ font-size:12px; }
      .chart-grid{ grid-template-columns:1fr; }
      .charts-section-title{ font-size:18px; }
      .chart-canvas-wrap{ height:200px; }
    }

    /* ========== PRINT ========== */
    @media print{
      body{ background:#fff; }
      .hotel-card, .matrix-card{ break-inside:avoid; box-shadow:none; border:1px solid var(--line); }
      .delta, .platform-logo, .hotel-logo, .hotel-mini-logo, .matrix-cell-delta{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      @page{ margin:12mm; }
    }
  </style>
</head>

    const PLATFORMS = {
      agoda:     "Agoda",
      booking:   "Booking.com",
      traveloka: "Traveloka",
      tripcom:   "Trip.com",
      tiket:     "Tiket.com"
    };

    const PLATFORM_ORDER = ["agoda", "booking", "traveloka", "tripcom", "tiket"];

    // ============================================================
    // Utility
    // ============================================================
    function formatNumber(v) {
      if (v === null || v === undefined || v === "N/A") return null;
      const n = Number(String(v).replace(/,/g, ""));
      return Number.isNaN(n) ? null : n;
    }

    function formatRating(v) {
      if (v === null || v === undefined || v === "N/A") return null;
      const n = Number(v);
      return Number.isNaN(n) ? null : n;
    }

    function renderDelta(delta, decimals = 1) {
      if (delta === null || delta === undefined || Number.isNaN(delta)) {
        return '<div class="delta delta-flat">N/A</div>';
      }
      const rounded = decimals === 0 ? Math.round(delta) : Number(delta.toFixed(decimals));
      if (rounded > 0) {
        const shown  = decimals === 0 ? rounded : rounded.toFixed(decimals);
        return `<div class="delta delta-up">▲ +${shown}</div>`;
      }
      if (rounded < 0) {
        const shown = decimals === 0 ? rounded : rounded.toFixed(decimals);
        return `<div class="delta delta-down">▼ ${shown}</div>`;
      }
      return `<div class="delta delta-flat">— 0</div>`;
    }

    function renderCompareRating(yesterday, today) {
      const y = formatRating(yesterday);
      const t = formatRating(today);
      if (y === null && t === null) return `<span class="na">data unavailable</span>`;
      const yTxt = y !== null ? y.toFixed(1) : "—";
      const tTxt = t !== null ? `<span class="today">${t.toFixed(1)}</span>` : "<span class='na'>N/A</span>";
      let deltaHtml = '<div class="delta delta-flat">—</div>';
      if (y !== null && t !== null) deltaHtml = renderDelta(t - y, 1);
      return `<div class="compare-values">${yTxt} <span class="arrow">→</span> ${tTxt}</div>${deltaHtml}`;
    }

    function renderCompareReviews(yesterday, today) {
      const y = formatNumber(yesterday);
      const t = formatNumber(today);
      if (y === null && t === null) return `<span class="na">data unavailable</span>`;
      const yTxt = y !== null ? y.toLocaleString("en-US") : "—";
      const tTxt = t !== null ? `<span class="today">${t.toLocaleString("en-US")}</span>` : "<span class='na'>N/A</span>";
      let deltaHtml = '<div class="delta delta-flat">—</div>';
      if (y !== null && t !== null) deltaHtml = renderDelta(t - y, 0);
      return `<div class="compare-values">${yTxt} <span class="arrow">→</span> ${tTxt}</div>${deltaHtml}`;
    }

    function buildYesterdayMap(history) {
      if (!Array.isArray(history) || history.length < 2) return { date: null, map: {} };
      const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
      const yesterday = sorted[sorted.length - 2];
      const map = {};
      (yesterday.hotels || []).forEach(h => { map[h.name] = h.platforms || {}; });
      return { date: yesterday.date, map };
    }

    function getTodayDate(data, history) {
      if (data.last_update) return String(data.last_update).slice(0, 10);
      if (Array.isArray(history) && history.length) {
        const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
        return sorted[sorted.length - 1].date;
      }
      return "—";
    }

    function renderHotelLogo(hotelName) {
      const info = HOTEL_INFO[hotelName];
      if (!info || !info.logoSrc) return `<div class="hotel-logo"></div>`;
      return `<div class="hotel-logo"><img src="${info.logoSrc}" alt="${hotelName}"></div>`;
    }

    function renderPlatformLogo(pname) {
      const src = PLATFORM_LOGOS[pname];
      if (!src) return `<span class="platform-logo"></span>`;
      return `<span class="platform-logo"><img src="${src}" alt="${pname}"></span>`;
    }

    // ============================================================
    // Render
    // ============================================================
    function renderMatrix(todayData, yesterdayMap) {
      const el = document.getElementById("matrixSection");
      const hotels = todayData.hotels || [];

      // Build platform header cells (with logos)
      const platformHeaders = PLATFORM_ORDER.map(pname => `
        <th>
          <div class="matrix-platform-head">
            ${renderPlatformLogo(pname)}
            <span>${PLATFORMS[pname] || pname}</span>
          </div>
        </th>
      `).join("");

      // Build hotel rows
      const hotelRows = hotels.map(hotel => {
        const yesterdayPlatforms = yesterdayMap[hotel.name] || {};

        const cells = PLATFORM_ORDER.map(pname => {
          const todayP = hotel.platforms?.[pname] || {};
          const yP     = yesterdayPlatforms[pname] || {};

          const tRating  = formatRating(todayP.rating);
          const yRating  = formatRating(yP.rating);
          const tReviews = formatNumber(todayP.reviews);
          const yReviews = formatNumber(yP.reviews);

          // If today has no data → show N/A
          if (tRating === null && tReviews === null) {
            return `<td><span class="matrix-na">N/A</span></td>`;
          }

          // Rating value
          const ratingDisplay = tRating !== null ? tRating.toFixed(1) : "—";

          // Rating delta (⭐ icon)
          let ratingDeltaHtml = "";
          if (yRating !== null && tRating !== null) {
            const diff = Number((tRating - yRating).toFixed(1));
            if (diff > 0) {
              ratingDeltaHtml = `<div class="matrix-cell-delta delta-up"><span class="delta-icon">⭐</span>▲ +${diff.toFixed(1)}</div>`;
            } else if (diff < 0) {
              ratingDeltaHtml = `<div class="matrix-cell-delta delta-down"><span class="delta-icon">⭐</span>▼ ${diff.toFixed(1)}</div>`;
            } else {
              ratingDeltaHtml = `<div class="matrix-cell-delta delta-flat"><span class="delta-icon">⭐</span>— 0</div>`;
            }
          }

          // Review count
          const reviewDisplay = tReviews !== null
            ? tReviews.toLocaleString("en-US")
            : "—";

          // Review delta (💬 icon)
          let reviewDeltaHtml = "";
          if (yReviews !== null && tReviews !== null) {
            const diff = tReviews - yReviews;
            if (diff > 0) {
              reviewDeltaHtml = `<div class="matrix-cell-delta delta-up"><span class="delta-icon">💬</span>▲ +${diff}</div>`;
            } else if (diff < 0) {
              reviewDeltaHtml = `<div class="matrix-cell-delta delta-down"><span class="delta-icon">💬</span>▼ ${diff}</div>`;
            } else {
              reviewDeltaHtml = `<div class="matrix-cell-delta delta-flat"><span class="delta-icon">💬</span>— 0</div>`;
            }
          }

          return `
            <td>
              <div class="matrix-cell-rating">${ratingDisplay}</div>
              ${ratingDeltaHtml}
              <div class="matrix-cell-divider"></div>
              <div class="matrix-cell-reviews">${reviewDisplay}</div>
              <div class="matrix-cell-reviews-label">reviews</div>
              ${reviewDeltaHtml}
            </td>
          `;
        }).join("");

        const hInfo = HOTEL_INFO[hotel.name] || {};
        const displayName = hInfo.shortName || hotel.name;

        return `
          <tr>
            <td class="matrix-hotel-cell">
              <div class="hotel-mini">
                <div class="hotel-mini-logo">
                  <img src="${hInfo.logoSrc || ''}" alt="${hotel.name}">
                </div>
                <div class="hotel-mini-name">${displayName}</div>
              </div>
            </td>
            ${cells}
          </tr>
        `;
      }).join("");

      el.innerHTML = `
        <div class="matrix-card">
          <h2 class="matrix-title">All Units Comparison</h2>
          <div class="matrix-sub">Today's rating, total reviews, and daily delta across all OTA platforms</div>
          <div class="matrix-wrap">
            <table class="matrix-table">
              <thead>
                <tr>
                  <th>Hotel</th>
                  ${platformHeaders}
                </tr>
              </thead>
              <tbody>${hotelRows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    // ============================================================
    // PERFORMANCE CHARTS — 1 panel per hotel, 2 charts side-by-side
    // (rating + reviews) dengan 5 line per chart (per platform)
    // ============================================================

    // Platform colors untuk CHART (kontras tinggi — tiap platform beda jelas)
    // Catatan: warna ini HANYA untuk garis chart. Logo platform di matrix &
    // detail card tetap pakai warna brand asli.
    const PLATFORM_COLORS = {
      agoda:     "#dc2626",   // Merah   — sesuai brand
      booking:   "#1e3a8a",   // Navy    — sesuai brand
      traveloka: "#10b981",   // Hijau   — kontras (dulu cyan)
      tripcom:   "#f59e0b",   // Oranye  — kontras (dulu biru)
      tiket:     "#a855f7"    // Ungu    — kontras (dulu biru)
    };

    /**
     * Build full timeline (oldest → newest) by merging history + today.
     * Returns: [{ date: "2026-04-22", hotels: [...] }, ...]
     */
    function buildFullTimeline(todayData, history) {
      const allEntries = [...(history || [])];

      // Add today's data as the latest entry (if not already in history)
      const todayDate = (todayData.last_update || "").slice(0, 10);
      if (todayDate && !allEntries.find(e => e.date === todayDate)) {
        allEntries.push({
          date: todayDate,
          hotels: todayData.hotels || []
        });
      }

      // Sort ascending by date (oldest first)
      allEntries.sort((a, b) => a.date.localeCompare(b.date));
      return allEntries;
    }

    /**
     * Extract timeline data for a specific hotel × platform × metric
     * Returns: array of values aligned with `dates` array.
     * Missing data = null (Chart.js will skip with spanGaps).
     */
    function extractTimeline(timeline, hotelName, platform, metric) {
      return timeline.map(entry => {
        const hotel = (entry.hotels || []).find(h => h.name === hotelName);
        if (!hotel) return null;
        const p = hotel.platforms?.[platform];
        if (!p) return null;

        const raw = metric === "rating" ? p.rating : p.reviews;
        if (raw === null || raw === undefined || raw === "N/A") return null;

        const num = Number(raw);
        return Number.isNaN(num) ? null : num;
      });
    }

    /**
     * Build Chart.js datasets for one hotel × one metric (rating OR reviews)
     */
    function buildDatasets(timeline, hotelName, metric) {
      return PLATFORM_ORDER.map(pname => {
        const data = extractTimeline(timeline, hotelName, pname, metric);
        // Skip platform if all values are null (no data ever)
        const hasData = data.some(v => v !== null);
        if (!hasData) return null;

        const color = PLATFORM_COLORS[pname];
        return {
          label: PLATFORMS[pname] || pname,
          data: data,
          borderColor: color,
          backgroundColor: color + "20",
          borderWidth: 2.2,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6,
          pointBackgroundColor: color,
          pointBorderColor: "#fff",
          pointBorderWidth: 1.5,
          spanGaps: true
        };
      }).filter(Boolean);
    }

    function createChart(canvas, labels, datasets, isRating) {
      return new Chart(canvas, {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: {
              position: "bottom",
              labels: {
                usePointStyle: true,
                boxWidth: 8,
                padding: 10,
                font: { size: 10.5, weight: "600", family: "'Inter', system-ui, sans-serif" }
              }
            },
            tooltip: {
              backgroundColor: "rgba(15,23,42,0.95)",
              titleFont: { size: 12, weight: "700" },
              bodyFont: { size: 11.5 },
              padding: 10,
              cornerRadius: 8,
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed.y;
                  if (v === null) return `${ctx.dataset.label}: N/A`;
                  return isRating
                    ? `${ctx.dataset.label}: ${v.toFixed(1)}`
                    : `${ctx.dataset.label}: ${v.toLocaleString("en-US")}`;
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: {
                font: { size: 10.5, family: "'Inter', system-ui, sans-serif" },
                color: "#64748b",
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: 8
              }
            },
            y: {
              beginAtZero: !isRating,
              grid: { color: "#e2e8f0" },
              ticks: {
                font: { size: 10.5, family: "'Inter', system-ui, sans-serif" },
                color: "#64748b",
                callback: (v) => isRating
                  ? v.toFixed(1)
                  : v.toLocaleString("en-US")
              },
              ...(isRating ? { suggestedMin: 0, suggestedMax: 10 } : {})
            }
          }
        }
      });
    }

    function renderCharts(todayData, history) {
      const el = document.getElementById("chartsSection");
      const timeline = buildFullTimeline(todayData, history);

      if (timeline.length < 2) {
        el.innerHTML = `
          <div class="chart-card">
            <div class="chart-empty">
              Performance chart will appear once at least 2 days of data are collected.
            </div>
          </div>
        `;
        return;
      }

      // Check if Chart.js loaded successfully (needs internet for CDN)
      if (typeof Chart === "undefined") {
        el.innerHTML = `
          <div class="chart-card">
            <div class="chart-empty">
              Performance charts could not be loaded. Please check your internet connection
              (Chart.js library is loaded from CDN on first open).
            </div>
          </div>
        `;
        return;
      }

      const dates = timeline.map(e => e.date);
      const periodLabel = `${dates[0]} → ${dates[dates.length - 1]} (${dates.length} days)`;

      // Build section title
      let html = `<h2 class="charts-section-title">Performance Trends</h2>`;

      // For each hotel, build a chart card
      (todayData.hotels || []).forEach(hotel => {
        const hInfo = HOTEL_INFO[hotel.name] || {};
        const hotelId = hotel.name.replace(/\s+/g, "_").replace(/[^\w]/g, "");

        html += `
          <div class="chart-card">
            <div class="chart-hotel-header">
              <div class="chart-hotel-logo">
                <img src="${hInfo.logoSrc || ''}" alt="${hotel.name}">
              </div>
              <div>
                <h3 class="chart-hotel-name">${hotel.name}</h3>
                <div class="chart-hotel-period">${periodLabel}</div>
              </div>
            </div>
            <div class="chart-grid">
              <div class="chart-box">
                <div class="chart-box-title">Rating Trend</div>
                <div class="chart-canvas-wrap">
                  <canvas id="chart_rating_${hotelId}"></canvas>
                </div>
              </div>
              <div class="chart-box">
                <div class="chart-box-title">Reviews Count Trend</div>
                <div class="chart-canvas-wrap">
                  <canvas id="chart_reviews_${hotelId}"></canvas>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      el.innerHTML = html;

      // Now instantiate Chart.js for each hotel (after DOM is in place)
      (todayData.hotels || []).forEach(hotel => {
        const hotelId = hotel.name.replace(/\s+/g, "_").replace(/[^\w]/g, "");

        const ratingCanvas = document.getElementById(`chart_rating_${hotelId}`);
        const reviewsCanvas = document.getElementById(`chart_reviews_${hotelId}`);

        if (ratingCanvas) {
          const ratingDatasets = buildDatasets(timeline, hotel.name, "rating");
          if (ratingDatasets.length) {
            createChart(ratingCanvas.getContext("2d"), dates, ratingDatasets, true);
          }
        }

        if (reviewsCanvas) {
          const reviewsDatasets = buildDatasets(timeline, hotel.name, "reviews");
          if (reviewsDatasets.length) {
            createChart(reviewsCanvas.getContext("2d"), dates, reviewsDatasets, false);
          }
        }
      });
    }

    function renderHotels(todayData, yesterdayMap) {
      const el = document.getElementById("hotelList");
      el.innerHTML = "";

      (todayData.hotels || []).forEach(hotel => {
        const yesterdayPlatforms = yesterdayMap[hotel.name] || {};
        const info = HOTEL_INFO[hotel.name] || { location: "" };

        const rows = PLATFORM_ORDER
          .filter(pname => hotel.platforms?.[pname] || yesterdayPlatforms[pname])
          .map(pname => {
            const todayP = hotel.platforms?.[pname] || {};
            const yP     = yesterdayPlatforms[pname] || {};
            return `
              <tr>
                <td>
                  <div class="platform-cell">
                    ${renderPlatformLogo(pname)}
                    ${PLATFORMS[pname] || pname}
                  </div>
                </td>
                <td class="compare-cell">${renderCompareRating(yP.rating, todayP.rating)}</td>
                <td class="compare-cell">${renderCompareReviews(yP.reviews, todayP.reviews)}</td>
              </tr>
            `;
          }).join("");

        const card = document.createElement("div");
        card.className = "hotel-card";
        card.innerHTML = `
          <div class="hotel-header">
            ${renderHotelLogo(hotel.name)}
            <div>
              <h2 class="hotel-name">${hotel.name}</h2>
              <div class="hotel-location">${info.location}</div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Platform</th>
                  <th>Rating (yesterday → today)</th>
                  <th>Reviews (yesterday → today)</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
        el.appendChild(card);
      });
    }

    // ============================================================
    // Init
    // ============================================================
    function init() {
      try {
        const data    = EMBEDDED_DATA;
        const history = EMBEDDED_HISTORY;
        const { date: yesterdayDate, map: yesterdayMap } = buildYesterdayMap(history);
        const todayDate = getTodayDate(data, history);
        document.getElementById("dateToday").textContent     = todayDate || "—";
        document.getElementById("dateYesterday").textContent = yesterdayDate || "—";
        renderMatrix(data, yesterdayMap);
        renderCharts(data, history);
        renderHotels(data, yesterdayMap);
      } catch (err) {
        console.error(err);
        document.getElementById("hotelList").innerHTML = `
          <div class="hotel-card" style="color:var(--danger)">
            <strong>Failed to load dashboard.</strong><br>
            Error: ${err.message}
          </div>
        `;
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
